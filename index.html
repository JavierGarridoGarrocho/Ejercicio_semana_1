<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scraper Marca</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <header class="text-center mb-4">
            <div class="p-4 rounded-4 bg-primary text-white shadow-sm">
              <div class="small text-white-50">Scraper de titulares</div>
              <h1 class="h3 mb-1">Noticias Marca</h1>
              <p class="mb-0 text-white-50">
                Pulsa el botón para obtener 5 noticias con autor y fecha.
              </p>
            </div>
          </header>

          <div class="card border-0 shadow-sm">
            <div class="card-body p-4 text-center">
              <div class="d-flex flex-column flex-sm-row gap-3 align-items-center justify-content-center">
                <button class="btn btn-lg btn-success px-4" id="scrapeBtn" type="button">
                  Ejecutar scraping
                </button>

                <div class="d-flex align-items-center gap-2">
                  <div
                    id="spinner"
                    class="spinner-border spinner-border-sm text-success d-none"
                    role="status"
                    aria-hidden="true"
                  ></div>
                  <div id="status" class="text-muted"></div>
                </div>
              </div>

              <div id="error" class="alert alert-danger mt-4 mb-0 d-none" role="alert"></div>
            </div>
          </div>

          <section id="results" class="mt-4"></section>
        </div>
      </div>
    </main>

    <script>
      const btn = document.getElementById("scrapeBtn");
      const results = document.getElementById("results");
      const errorEl = document.getElementById("error");
      const statusEl = document.getElementById("status");
      const spinner = document.getElementById("spinner");
      const limit = 5;

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      async function runScrape() {
        errorEl.classList.add("d-none");
        results.innerHTML = "";

        btn.disabled = true;
        spinner.classList.remove("d-none");
        statusEl.textContent = "Scraping en progreso...";

        try {
          const res = await fetch(`/api/scrape?limit=${encodeURIComponent(limit)}`, {
            headers: { Accept: "application/json" },
          });
          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || "Request failed");
          }

          if (!data.items || data.items.length === 0) {
            results.innerHTML = '<div class="text-muted">No se encontraron resultados.</div>';
            return;
          }

          const header = document.createElement("div");
          header.className = "mb-3";
          header.innerHTML = `
            <div class="d-flex align-items-center justify-content-between gap-2 flex-wrap">
              <div class="fw-semibold">Resultados</div>
              <div class="badge text-bg-primary rounded-pill">${data.items.length} noticias</div>
            </div>
          `;
          results.appendChild(header);

          const grid = document.createElement("div");
          grid.className = "row g-3";

          data.items.forEach((item) => {
            const col = document.createElement("div");
            col.className = "col-md-6";

            const title = item.title || "(No title)";
            const author = item.author
              ? `<small class="text-muted d-block">Autor: ${escapeHtml(item.author)}</small>`
              : "";
            const date = item.date
              ? `<small class="text-muted d-block">Fecha: ${escapeHtml(item.date)}</small>`
              : "";

            const card = document.createElement("a");
            card.className = "card border-0 shadow-sm h-100 text-decoration-none";
            card.target = "_blank";
            card.rel = "noopener noreferrer";
            card.href = item.url || "#";

            card.innerHTML = `
              <div class="card-body">
                <div class="d-flex align-items-start justify-content-between gap-3">
                  <div>
                    <div class="text-uppercase small text-primary fw-semibold mb-1">Marca</div>
                    <div class="fw-semibold">${escapeHtml(title)}</div>
                  </div>
                  <span class="badge text-bg-success rounded-pill">MARCA</span>
                </div>
                <div class="mt-3">
                  ${author}
                  ${date}
                </div>
              </div>
            `;

            col.appendChild(card);
            grid.appendChild(col);
          });

          results.appendChild(grid);
        } catch (err) {
          errorEl.textContent = err?.message || String(err);
          errorEl.classList.remove("d-none");
        } finally {
          btn.disabled = false;
          spinner.classList.add("d-none");
          statusEl.textContent = "";
        }
      }

      btn.addEventListener("click", runScrape);
    </script>
  </body>
</html>
